name: "Tarot CI — Python (Backend + Agent)"

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "agent/**"
      - "prompts/**"
      - "requirements.txt"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "agent/**"
      - "prompts/**"
      - "requirements.txt"

env:
  PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/backend

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: "Lint (ruff)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff — check
        run: ruff check backend/app agent

      - name: Ruff — format check
        run: ruff format --check backend/app agent

  # ── Agent unit tests (no DB, no real API key) ────────────────────────────────
  test-agent:
    name: "Test — Agent (unit, stub LLM)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ./backend pytest

      - name: Run agent tests
        run: python -m pytest agent/tests/ -q

  # ── Backend unit tests (no DB) ───────────────────────────────────────────────
  test-backend-unit:
    name: "Test — Backend unit (no DB)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Run backend unit tests
        run: python -m pytest app/tests/unit -q
        working-directory: backend

  # ── Backend integration tests (requires PostgreSQL) ─────────────────────────
  test-backend-integration:
    name: "Test — Backend integration (PostgreSQL)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: multi_agent_tarot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/multi_agent_tarot

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Run Alembic migrations
        run: python -m alembic upgrade head
        working-directory: backend

      - name: Run backend integration tests
        run: python -m pytest app/tests/integration -q
        working-directory: backend
