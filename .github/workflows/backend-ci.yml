name: Backend CI

on:
  pull_request:
    paths:
      - ".github/workflows/backend-ci.yml"
      - "Docker/**"
      - "agent/**"
      - "backend/**"
      - "docker-compose.yml"
      - "evals/promptfoo/**"
      - "README.md"
      - "docs/05-Backend-Build-Plan.md"
      - "docs/07-Backend-Delivery-Runbook.md"
  push:
    paths:
      - ".github/workflows/backend-ci.yml"
      - "Docker/**"
      - "agent/**"
      - "backend/**"
      - "docker-compose.yml"
      - "evals/promptfoo/**"
      - "README.md"
      - "docs/05-Backend-Build-Plan.md"
      - "docs/07-Backend-Delivery-Runbook.md"

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Expose Python interpreter for Promptfoo
        run: echo "PROMPTFOO_PYTHON=$(python -c 'import sys; print(sys.executable)')" >> "$GITHUB_ENV"

      - name: Run pytest suite
        working-directory: backend
        run: python -m pytest app/tests -q

      - name: Run Promptfoo regression suite
        env:
          PROMPTFOO_DISABLE_TELEMETRY: "1"
        run: npx promptfoo@latest eval -c evals/promptfoo/promptfooconfig.yaml

