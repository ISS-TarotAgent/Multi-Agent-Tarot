services:
  postgres:
    image: postgres:16-alpine
    container_name: multi-agent-tarot-postgres
    environment:
      POSTGRES_DB: multi_agent_tarot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d multi_agent_tarot"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: Docker/backend.Dockerfile
    container_name: multi-agent-tarot-backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - backend/.env.example
    environment:
      APP_ENV: docker
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/multi_agent_tarot
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  postgres_data:

