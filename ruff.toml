line-length = 120
target-version = "py312"
src = ["backend/app", "agent"]

[lint]
# E4/E7/E9: critical pycodestyle errors; F: pyflakes (undefined names, unused imports)
select = ["E4", "E7", "E9", "F"]
ignore = [
    "F401",  # unused-import — many are intentional re-exports or lazy imports
]

[lint.per-file-ignores]
"*/tests/*" = ["F811"]          # allow redefined names in test fixtures
"agent/workflows/orchestrator.py" = ["E402"]  # deferred imports after try/except ImportError block
